<!DOCTYPE html>
<html>
<head>
  <title>MediGuard AI — EverydayMeds Settings</title>
  <meta charset="utf-8" />
  <style>
    :root {
      --brand: #7c3aed;
      --brand-dark: #6d28d9;
      --brand-soft: #f5f3ff;
      --accent: #059669;
      --accent-dark: #047857;
      --ink: #0f172a;
      --ink-soft: #475569;
      --muted: #64748b;
      --line: #e6e8ef;
      --bg: #f4f5fb;
      --card: #ffffff;
      --radius: 16px;
      --shadow: 0 1px 2px rgba(16,24,40,.04), 0 12px 32px -12px rgba(16,24,40,.12);
      --shadow-hover: 0 1px 2px rgba(16,24,40,.05), 0 20px 44px -16px rgba(76,29,149,.28);
    }

    * { box-sizing: border-box; }

    body {
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 0;
      padding: 0 20px 80px;
      background:
        radial-gradient(1100px 480px at 100% -10%, #ede9fe 0%, rgba(237,233,254,0) 60%),
        radial-gradient(900px 420px at -10% 0%, #d1fae5 0%, rgba(209,250,229,0) 55%),
        var(--bg);
      color: var(--ink-soft);
      -webkit-font-smoothing: antialiased;
      line-height: 1.5;
    }

    .wrap { max-width: 720px; margin: 0 auto; }

    /* ── Hero header ── */
    .hero {
      position: relative;
      margin-top: 32px;
      padding: 26px 28px;
      border-radius: 20px;
      color: #fff;
      background: linear-gradient(135deg, #7c3aed 0%, #6d28d9 45%, #4f46e5 100%);
      box-shadow: 0 20px 44px -18px rgba(76,29,149,.6);
      overflow: hidden;
    }
    .hero::after {
      content: "";
      position: absolute;
      right: -60px; top: -80px;
      width: 260px; height: 260px;
      background: radial-gradient(circle, rgba(255,255,255,.22), rgba(255,255,255,0) 70%);
      pointer-events: none;
    }
    .hero-row { display: flex; align-items: center; gap: 16px; position: relative; z-index: 1; }
    .hero-badge {
      width: 52px; height: 52px; flex: none;
      display: grid; place-items: center;
      background: rgba(255,255,255,.16);
      border: 1px solid rgba(255,255,255,.28);
      border-radius: 15px;
      -webkit-backdrop-filter: blur(4px);
      backdrop-filter: blur(4px);
    }
    .hero h1 { margin: 0; font-size: 21px; font-weight: 800; letter-spacing: -.02em; }
    .hero p { margin: 4px 0 0; font-size: 13px; color: rgba(255,255,255,.86); }

    /* ── Cards ── */
    .card {
      background: var(--card);
      padding: 24px;
      border-radius: var(--radius);
      border: 1px solid var(--line);
      margin-top: 18px;
      box-shadow: var(--shadow);
      transition: box-shadow .25s ease, transform .25s ease, border-color .25s ease;
    }
    .card:hover { box-shadow: var(--shadow-hover); border-color: #e2d9fb; transform: translateY(-1px); }

    .card-head { display: flex; align-items: center; gap: 12px; margin-bottom: 6px; }
    .card-ic {
      width: 34px; height: 34px; flex: none;
      display: grid; place-items: center;
      border-radius: 10px;
      background: var(--brand-soft);
      color: var(--brand);
    }
    .card-ic.emerald { background: #ecfdf5; color: var(--accent); }
    .card-ic.amber   { background: #fffbeb; color: #b45309; }
    .card-ic.slate   { background: #f1f5f9; color: #475569; }
    .card h2 {
      margin: 0;
      font-size: 15.5px;
      font-weight: 700;
      color: var(--ink);
      letter-spacing: -.01em;
      display: flex; align-items: center; flex-wrap: wrap; gap: 8px;
    }

    label {
      display: block;
      font-weight: 600;
      margin-bottom: 6px;
      color: var(--ink);
      font-size: 12.5px;
    }
    input[type="text"], input[type="password"], textarea {
      width: 100%;
      padding: 11px 13px;
      border: 1.5px solid var(--line);
      border-radius: 10px;
      font-size: 13px;
      margin-bottom: 8px;
      background: #fbfbfe;
      color: var(--ink);
      font-family: inherit;
      transition: border-color .18s ease, box-shadow .18s ease, background .18s ease;
    }
    input::placeholder, textarea::placeholder { color: #aab2c5; }
    input:focus, textarea:focus {
      outline: none;
      background: #fff;
      border-color: var(--brand);
      box-shadow: 0 0 0 4px rgba(124,58,237,.12);
    }
    textarea { resize: vertical; line-height: 1.55; }

    .help {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.55;
      margin-bottom: 4px;
    }
    .help a { color: var(--brand); font-weight: 600; }
    code {
      background: #f1f5f9;
      padding: 1.5px 6px;
      border-radius: 5px;
      font-size: 11.5px;
      color: var(--brand-dark);
    }

    .badge {
      display: inline-block;
      padding: 3px 9px;
      border-radius: 999px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .02em;
      text-transform: uppercase;
    }
    .badge-rec { background: #d1fae5; color: #065f46; }
    .badge-opt { background: #eef2ff; color: #4338ca; }

    /* ── Buttons ── */
    button { font-family: inherit; }
    .btn {
      border: none;
      border-radius: 10px;
      font-weight: 600;
      cursor: pointer;
      font-size: 12.5px;
      padding: 9px 16px;
      transition: transform .12s ease, box-shadow .2s ease, background .2s ease, opacity .2s;
    }
    .btn:active { transform: translateY(1px); }
    .btn-primary { background: var(--brand); color: #fff; }
    .btn-primary:hover { background: var(--brand-dark); }
    .btn-emerald { background: var(--accent); color: #fff; }
    .btn-emerald:hover { background: var(--accent-dark); }
    .btn-amber { background: #b45309; color: #fff; }
    .btn-amber:hover { background: #92400e; }
    .btn-navy { background: #1e40af; color: #fff; }
    .btn-navy:hover { background: #1e3a8a; }
    .btn-ghost { background: #f1f5f9; color: #475569; border: 1px solid #e2e8f0; }
    .btn-ghost:hover { background: #e2e8f0; }

    /* row action bar for add/reset */
    .row-actions { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }

    /* ── Toggle switch ── */
    .toggle-row {
      display: flex; align-items: center; justify-content: space-between; gap: 16px;
      padding: 14px 16px;
      border: 1.5px solid var(--line);
      border-radius: 12px;
      background: #fbfbfe;
      margin-top: 12px;
      transition: border-color .2s ease, background .2s ease;
    }
    .toggle-row:hover { border-color: #ddd6fe; background: #faf9ff; }
    .toggle-row .t-label { font-weight: 600; color: var(--ink); font-size: 13.5px; }
    .toggle-row .t-sub { font-weight: 400; color: var(--muted); font-size: 12px; margin-top: 2px; }
    .switch { position: relative; display: inline-block; width: 46px; height: 26px; flex: none; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute; cursor: pointer; inset: 0;
      background: #cbd5e1; border-radius: 999px;
      transition: background .22s ease;
    }
    .slider::before {
      content: ""; position: absolute;
      height: 20px; width: 20px; left: 3px; top: 3px;
      background: #fff; border-radius: 50%;
      box-shadow: 0 1px 3px rgba(0,0,0,.25);
      transition: transform .22s cubic-bezier(.34,1.56,.64,1);
    }
    .switch input:checked + .slider { background: linear-gradient(135deg, #7c3aed, #6d28d9); }
    .switch input:checked + .slider::before { transform: translateX(20px); }
    .switch input:focus-visible + .slider { box-shadow: 0 0 0 4px rgba(124,58,237,.22); }

    /* ── Range ── */
    input[type="range"] {
      -webkit-appearance: none; appearance: none;
      height: 6px; border-radius: 999px;
      background: linear-gradient(90deg, var(--brand), #a78bfa);
      outline: none;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none; appearance: none;
      width: 20px; height: 20px; border-radius: 50%;
      background: #fff; border: 3px solid var(--brand);
      box-shadow: 0 2px 6px rgba(124,58,237,.4); cursor: pointer;
    }

    /* ── Save bar ── */
    .save-bar {
      position: sticky; bottom: 0; z-index: 20;
      margin-top: 26px;
      padding: 16px 0 20px;
      background: linear-gradient(to top, var(--bg) 55%, rgba(244,245,251,0));
      display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
    }
    .save-btn {
      background: linear-gradient(135deg, #059669, #047857);
      color: #fff; border: none;
      padding: 13px 30px; border-radius: 12px;
      font-weight: 700; font-size: 14.5px; cursor: pointer;
      box-shadow: 0 12px 26px -10px rgba(5,150,105,.6);
      transition: transform .12s ease, box-shadow .2s ease;
      display: inline-flex; align-items: center; gap: 9px;
    }
    .save-btn:hover { transform: translateY(-1px); box-shadow: 0 16px 30px -10px rgba(5,150,105,.7); }
    .save-btn:active { transform: translateY(0); }
    .status {
      font-size: 13px; font-weight: 500;
      padding: 9px 14px; border-radius: 10px;
    }
    .status:empty { display: none; }
    .success { color: #166534; background: #dcfce7; border: 1px solid #bbf7d0; }

    .info-box {
      background: linear-gradient(135deg, #ecfdf5, #f0fdfa);
      border: 1px solid #a7f3d0;
      border-radius: var(--radius);
      padding: 18px 20px;
      margin-top: 22px;
      font-size: 13px;
      color: #065f46;
      line-height: 1.65;
    }
    .info-box strong { font-weight: 800; }

    /* ── Quick-chip editor rows ── */
    .qc-row {
      display: grid; grid-template-columns: 160px 1fr auto; gap: 10px;
      align-items: start;
      padding: 12px; background: #fafaff; border: 1px solid var(--line); border-radius: 12px;
    }
    .qc-row input[type="text"], .qc-row textarea { margin-bottom: 0; }
    .qc-row .qc-del {
      background: #fef2f2; color: #b91c1c; border: 1px solid #fecaca;
      padding: 9px 13px; border-radius: 9px; font-size: 12px; font-weight: 600;
      cursor: pointer; height: fit-content; transition: background .18s;
    }
    .qc-row .qc-del:hover { background: #fee2e2; }
    .qc-empty {
      color: #94a3b8; font-size: 13px; text-align: center; padding: 18px;
      background: #fafaff; border: 1.5px dashed #d7dae5; border-radius: 12px;
    }

    /* ── Patient counselling template rows ── */
    .pt-row {
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 14px;
      background: #fafaff;
      border: 1.5px solid var(--line);
      border-radius: 12px;
    }
    .pt-row.is-active {
      border-color: #a7f3d0;
      background: #f0fdf4;
      box-shadow: 0 0 0 1px rgba(5,150,105,.08);
    }
    .pt-row-head {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .pt-active {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-weight: 700;
      color: #047857;
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
    }
    .pt-active input { margin: 0; accent-color: #059669; }
    .pt-name {
      flex: 1;
      min-width: 160px;
      margin-bottom: 0 !important;
    }
    .pt-text {
      width: 100%;
      min-height: 180px;
      margin-bottom: 0 !important;
    }
    .pt-del {
      background: #fef2f2;
      color: #b91c1c;
      border: 1px solid #fecaca;
      padding: 9px 13px;
      border-radius: 9px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: background .18s;
    }
    .pt-del:hover { background: #fee2e2; }
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <div class="hero-row">
        <div class="hero-badge">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="m9 12 2 2 4-4"/></svg>
        </div>
        <div>
          <h1>MediGuard AI</h1>
          <p>EverydayMeds — extension settings &amp; clinical defaults</p>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-head">
        <span class="card-ic emerald">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="8" rx="2"/><rect x="2" y="14" width="20" height="8" rx="2"/><line x1="6" y1="6" x2="6.01" y2="6"/><line x1="6" y1="18" x2="6.01" y2="18"/></svg>
        </span>
        <h2>Server URL <span class="badge badge-rec">Recommended</span></h2>
      </div>
      <label for="serverUrl">MediGuard Server URL</label>
      <input type="text" id="serverUrl" placeholder="https://your-app.replit.app" />
      <div class="help">Connect to the MediGuard server for AI analysis. No API key needed — the server handles everything securely.</div>
    </div>

    <div class="card">
      <div class="card-head">
        <span class="card-ic">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
        </span>
        <h2>OpenAI API Key <span class="badge badge-opt">Optional fallback</span></h2>
      </div>
      <label for="apiKey">API Key</label>
      <input type="password" id="apiKey" placeholder="sk-proj-..." />
      <div class="help">Only needed if you don't have a server URL. Get one at <a href="https://platform.openai.com/api-keys" target="_blank" rel="noopener">platform.openai.com/api-keys</a></div>
    </div>

    <div class="card">
      <div class="card-head">
        <span class="card-ic">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M2 12h20"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
        </span>
        <h2>Web search (AI Assist) <span class="badge badge-opt">Optional</span></h2>
      </div>
      <label for="tavilyKey">Tavily API Key</label>
      <input type="password" id="tavilyKey" placeholder="tvly-..." />
      <div class="help">Powers <strong>Web search</strong> in Custom message → AI Assist. Free tier at <a href="https://tavily.com" target="_blank" rel="noopener">tavily.com</a>. Without this, basic DuckDuckGo fallback is used when web search is enabled.</div>
    </div>

    <div class="card">
      <div class="card-head">
        <span class="card-ic">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        </span>
        <h2>Custom Assistant ID <span class="badge badge-opt">Optional</span></h2>
      </div>
      <label for="assistantId">Assistant ID</label>
      <input type="text" id="assistantId" placeholder="asst_abc123..." />
      <div class="help">If you've created a custom GPT Assistant with uploaded SOPs, paste its ID here.</div>
    </div>

    <div class="card">
      <div class="card-head">
        <span class="card-ic emerald">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><path d="m9 15 2 2 4-4"/></svg>
        </span>
        <h2>Approval Drawer Defaults <span class="badge badge-opt">Editable</span></h2>
      </div>
      <div class="help">These are the texts that auto-fill in the pharmacy's Approve &amp; Issue Rx drawer. Edit them to match your preferred wording. They take effect immediately on every new prescription approval.</div>

      <label for="scrAccessedText" style="margin-top:14px;">SCR — "Accessed" summary</label>
      <textarea id="scrAccessedText" rows="2" placeholder="SCR accessed and checked no contraindication found or any concerns, happy to continue."></textarea>
      <div class="help">Fills the SCR Summary box when SCR Accessed is selected in step 1.</div>

      <label for="scrText" style="margin-top:14px;">SCR — "Not Accessed" reason</label>
      <textarea id="scrText" rows="2" placeholder="SCR not available, information provided by the patient."></textarea>
      <div class="help">Fills the reason box when SCR Not Accessed is selected in step 1.</div>

      <label for="counsellingText" style="margin-top:14px;">Communication summary (counselling)</label>
      <textarea id="counsellingText" rows="3" placeholder="Patient has been contacted by email and provided counselling and information on their treatment. Patient can contact us at any time if they need further help or information."></textarea>
      <div class="help">Fills the "Communication summary" field in step 1 after picking Secure Message.</div>

      <label for="rationaleText" style="margin-top:14px;">Final approval rationale</label>
      <textarea id="rationaleText" rows="5" placeholder="The patient meets the service eligibility criteria. The consultation responses, medical history, current medication, allergies and supporting documentation have been reviewed. No known contraindications, clinically significant interactions, red flags or other concerns have been identified."></textarea>
      <div class="help">The default rationale in step 2. Anything you type into the sidepanel "comment" box is appended below this on a new line.</div>

      <label for="holdReasonText" style="margin-top:14px;">Default "Place on hold" reason</label>
      <textarea id="holdReasonText" rows="2" placeholder="Waiting for patient to upload documents."></textarea>
      <div class="help">Used by the amber "Place on hold" button in the sidepanel. Anything you type into the sidepanel "Hold reason" box is appended below this on a new line.</div>

      <div class="row-actions">
        <button type="button" id="resetDefaults" class="btn btn-ghost">Reset to built-in defaults</button>
      </div>
    </div>

    <div class="card">
      <div class="card-head">
        <span class="card-ic emerald">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        </span>
        <h2>Patient counselling on Approve all <span class="badge badge-opt">Editable</span></h2>
      </div>
      <div class="help">
        After you click <strong>Approve all</strong> in the side panel, the extension can automatically send a counselling message through encrypted patient chat.
        Add one template per medication or consultation type — only the <strong>active</strong> template is sent.
        Use <code>{patient_name}</code> anywhere and it will be replaced with the current patient's name.
      </div>

      <label class="toggle-row" for="sendPatientCounselling">
        <span>
          <span class="t-label">Send patient counselling after Approve all</span>
          <span class="t-sub">When off, Approve all still marks steps done but skips the patient chat message.</span>
        </span>
        <span class="switch">
          <input type="checkbox" id="sendPatientCounselling" checked />
          <span class="slider"></span>
        </span>
      </label>

      <div id="patientCounsellingList" style="display:flex; flex-direction:column; gap:12px; margin-top:16px;"></div>
      <div class="row-actions">
        <button type="button" id="addPatientCounselling" class="btn btn-emerald">+ Add template</button>
        <button type="button" id="resetPatientCounselling" class="btn btn-ghost">Reset to default</button>
      </div>
    </div>

    <div class="card">
      <div class="card-head">
        <span class="card-ic slate">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7.9 20A9 9 0 1 0 4 16.1L2 22z"/></svg>
        </span>
        <h2>Quick comment buttons <span class="badge badge-opt">Editable</span></h2>
      </div>
      <div class="help">
        Add chip buttons that show up above the "Your comment" textarea in the side panel.
        Click a chip there and its text drops straight into the comment box — so you don't
        have to retype the same rationale on every prescription.
      </div>
      <div id="quickCommentsList" style="display:flex; flex-direction:column; gap:10px; margin-top:14px;"></div>
      <div class="row-actions">
        <button type="button" id="addQuickComment" class="btn btn-navy">+ Add button</button>
        <button type="button" id="resetQuickComments" class="btn btn-ghost">Reset to default</button>
      </div>
    </div>

    <div class="card">
      <div class="card-head">
        <span class="card-ic amber">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/></svg>
        </span>
        <h2>Quick hold-reason buttons <span class="badge badge-opt">Editable</span></h2>
      </div>
      <div class="help">
        Add chip buttons that show up above the "Hold reason" textarea in the side panel.
        Same idea as the comment chips above, but for the orange "Place on hold" flow.
      </div>
      <div id="quickHoldsList" style="display:flex; flex-direction:column; gap:10px; margin-top:14px;"></div>
      <div class="row-actions">
        <button type="button" id="addQuickHold" class="btn btn-amber">+ Add button</button>
        <button type="button" id="resetQuickHolds" class="btn btn-ghost">Reset to default</button>
      </div>
    </div>

    <div class="card">
      <div class="card-head">
        <span class="card-ic">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18"/><path d="M9 21V9"/></svg>
        </span>
        <h2>Side panel layout <span class="badge badge-opt">Optional</span></h2>
      </div>

      <label class="toggle-row" for="showWorkflowSteps">
        <span>
          <span class="t-label">Show prescription steps panel</span>
          <span class="t-sub">Progress bar in the side panel that expands to show step cards.</span>
        </span>
        <span class="switch">
          <input type="checkbox" id="showWorkflowSteps" checked />
          <span class="slider"></span>
        </span>
      </label>

      <label class="toggle-row" for="showEmailSection">
        <span>
          <span class="t-label">Show "Email to Patient" section</span>
          <span class="t-sub">The email templates + message box under the hold flow. Off by default.</span>
        </span>
        <span class="switch">
          <input type="checkbox" id="showEmailSection" />
          <span class="slider"></span>
        </span>
      </label>

      <label class="toggle-row" for="showDoseCalculator">
        <span>
          <span class="t-label">Show GLP-1 Switching Calculator</span>
          <span class="t-sub">The purple "Tools" calculator for switching between GLP-1 medications. Off by default.</span>
        </span>
        <span class="switch">
          <input type="checkbox" id="showDoseCalculator" />
          <span class="slider"></span>
        </span>
      </label>

      <label class="toggle-row" for="showGapCalculator">
        <span>
          <span class="t-label">Show Gap in Treatment Calculator</span>
          <span class="t-sub">The amber "Tools" calculator for working out treatment gaps. Off by default.</span>
        </span>
        <span class="switch">
          <input type="checkbox" id="showGapCalculator" />
          <span class="slider"></span>
        </span>
      </label>
    </div>

    <div class="card">
      <div class="card-head">
        <span class="card-ic">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
        </span>
        <h2>Extension zoom <span class="badge badge-opt">Optional</span></h2>
      </div>
      <div class="help">Adjust how big the side panel UI appears. Useful on high-DPI displays where the panel looks tiny.</div>
      <label for="uiZoom" style="margin-top:14px; display:flex; align-items:center; gap:12px;">
        <span>UI Zoom</span>
        <input type="range" id="uiZoom" min="80" max="200" step="5" value="100" style="flex:1;" />
        <span id="uiZoomValue" style="min-width:48px; text-align:right; font-weight:800; color:var(--brand);">100%</span>
      </label>
    </div>

    <div class="save-bar">
      <button class="save-btn" id="save">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><path d="M17 21v-8H7v8"/><path d="M7 3v5h8"/></svg>
        Save Settings
      </button>
      <div id="status" class="status"></div>
    </div>

    <div class="info-box">
      <strong>EverydayMeds Extension</strong><br>
      This extension adds a step-by-step prescription workflow dashboard to rx.everydaymeds.co.uk. It reads the Clinical Review, Consultation, Documents and other tabs to check GLP-1 SOP compliance, and lets you mark each step as done — automatically navigating to the next tab.
    </div>
  </div>

  <script src="options.js"></script>
</body>
</html>
